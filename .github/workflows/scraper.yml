name: scraper

on:
  workflow_dispatch:

concurrency:
  group: blog-serial-global     # any constant string
  cancel-in-progress: false    # DO NOT cancel; queue instead

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Clone private repo
      env:
        PAT: ${{ secrets.PAT }}
      run: |
        git clone https://x-access-token:${PAT}@github.com/SakamichiSeries/blog-archive-scraper.git

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8' # Specify the Python version you need

    - name: Install dependencies
      run: |
        cd blog-archive-scraper
        pip install -r requirements.txt

    - name: Run Python script
      run: |
        cd blog-archive-scraper
        python scraper_dispatcher.py
      env:
        TOKEN_GITHUB: ${{ secrets.PAT }}
        RUNNING_GITHUB_ACTIONS: True

    - name: Commit and Push Changes
      run: |
          cd blog-archive-scraper
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update sent IDs - $(date)"
            attempt=0
            max_attempts=5
            until [ $attempt -ge $max_attempts ]
            do
              if git push; then
                echo "Changes committed and pushed."
                break
              else
                attempt=$((attempt+1))
                echo "Push failed. Attempt $attempt/$max_attempts. Running git pull and retrying..."
                git pull --rebase
                sleep 10
              fi
            done
            if [ $attempt -eq $max_attempts ]; then
              echo "Push failed after $max_attempts attempts."
              exit 1
            fi
          else
            echo "No changes to commit."
          fi
